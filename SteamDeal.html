<!DOCTYPE html>
<html lang="th" data-theme="mono">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SteamDeal — เกมลดราคาเรียลไทม์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="steamdeal.css">
</head>
<body>

<header>
  <div class="hi">
    <a class="logo" href="#">Steam<span>Deal</span></a>
    <div class="live-dot" id="liveDot" style="display:none"></div>
    <span class="live-label" id="liveLabel" style="display:none">LIVE</span>
    <span class="updated-at" id="updatedAt"></span>
    <div class="hs">
      <span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="ค้นหาเกม..." autocomplete="off">
    </div>
    <div class="hr">
      <button class="filter-btn" id="filterBtn" onclick="toggleSidebarMobile()">⚙ ตัวกรอง</button>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchSteam(true)">⟳ รีเฟรช</button>
      <div class="tp">
        <button class="tb on" data-t="mono" title="Mono"></button>
        <button class="tb" data-t="dark" title="Dark"></button>
        <button class="tb" data-t="steam" title="Steam"></button>
        <button class="tb" data-t="rose" title="Rose"></button>
        <button class="tb" data-t="forest" title="Forest"></button>
      </div>
    </div>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="fs">
      <div class="ft">งบที่มี</div>
      <div class="bwrap">
        <span>฿</span>
        <input type="number" class="binp" id="sbBudget" placeholder="เช่น 300" min="0">
      </div>
      <div class="bres" id="sbRes"></div>
    </div>

    <div class="fs">
      <div class="ft">ส่วนลด</div>
      <div class="dbtns">
        <button class="db on" data-disc="0">ทุกส่วนลด</button>
        <button class="db" data-disc="50">ลดเกิน 50%</button>
        <button class="db" data-disc="70">ลดเกิน 70%</button>
        <button class="db" data-disc="90">ลดเกิน 90%</button>
      </div>
    </div>

    <div class="fs">
      <div class="ft">ประเภท</div>
      <div class="ggrid" id="genreFilter">
        <button class="gt on" data-g="">ทั้งหมด</button>
        <button class="gt" data-g="Action">Action</button>
        <button class="gt" data-g="Adventure">Adventure</button>
        <button class="gt" data-g="RPG">RPG</button>
        <button class="gt" data-g="Strategy">Strategy</button>
        <button class="gt" data-g="Simulation">Simulation</button>
        <button class="gt" data-g="Horror">Horror</button>
        <button class="gt" data-g="Indie">Indie</button>
        <button class="gt" data-g="Racing">Racing</button>
        <button class="gt" data-g="Sports">Sports</button>
      </div>
    </div>

    <div class="fs">
      <div class="ft">เรียงตาม</div>
      <select class="ssel" id="sortSel">
        <option value="disc">ส่วนลดมากสุด</option>
        <option value="pasc">ราคาถูกสุด</option>
        <option value="pdesc">ราคาแพงสุด</option>
        <option value="name">ชื่อ A–Z</option>
        <option value="rev">รีวิวดีสุด</option>
      </select>
    </div>
  </aside>

  <main>
    <div class="stats">
      <div class="sc"><span class="sn" id="stTotal">—</span><div class="sl">เกมลดราคา</div></div>
      <div class="sc"><span class="sn" id="stMax">—</span><div class="sl">ลดสูงสุด</div></div>
      <div class="sc"><span class="sn" id="stAvg">—</span><div class="sl">ลดเฉลี่ย</div></div>
      <div class="sc"><span class="sn" id="stFree">—</span><div class="sl">เกมฟรี</div></div>
    </div>

    <div class="status-banner loading" id="statusBanner">
      <span>⏳</span>
      <span class="s-text">กำลังดึงข้อมูลจาก Steam...</span>
    </div>

    <div class="bp">
      <div class="bpt">🎮 งบเท่านี้ซื้ออะไรได้บ้าง?</div>
      <div class="brow">
        <input type="number" id="budgetIn" placeholder="กรอกงบ เช่น 500 บาท" min="0">
        <button onclick="calcBudget()">หาเกม</button>
      </div>
      <div class="bout" id="budgetOut"></div>
    </div>

    <div class="tabs">
      <button class="tab on" data-tab="sale" onclick="switchTab('sale')">⚡ เกมลดราคา</button>
      <button class="tab" data-tab="free" onclick="switchTab('free')">🆓 เกมฟรี</button>
      <button class="tab" data-tab="dlc" onclick="switchTab('dlc')">🎁 DLC</button>
      <button class="tab" data-tab="wish" onclick="switchTab('wish')">❤️ Wishlist</button>
    </div>

    <div class="sh">
      <span class="st" id="secTitle">⚡ เกมลดราคาตอนนี้</span>
      <span class="rc" id="rcCount"></span>
    </div>

    <div class="gg" id="gameGrid"></div>
    <div id="sentinel"></div>
    <div class="lmi" id="lmi">กำลังโหลด...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="steamdeal.config.js"></script>
<script src="steamdeal.js"></script>
</body>
</html>
